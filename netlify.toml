[build]
  publish = "public"
  command = "npm ci && hugo --gc --minify && npx pagefind --site public/experts && cp public/experts/_redirects public/_redirects"

  [build.environment]
    HUGO_VERSION = "0.157.0"

[context.production.environment]
  HUGO_ENV           = "production"
  HUGO_ENABLEGITINFO = "true"

[context.split1]
  command = "npm ci && hugo --gc --minify --enableGitInfo && npx pagefind --site public/experts && cp public/experts/_redirects public/_redirects"

  [context.split1.environment]
    HUGO_ENV = "production"

[context.deploy-preview]
  command = "npm ci && hugo --gc --minify --buildFuture -b $DEPLOY_PRIME_URL/experts/ && npx pagefind --site public/experts && cp public/experts/_redirects public/_redirects"
  
  [context.deploy-preview.environment]
    HUGO_ENV           = "staging"

[context.branch-deploy]
  command = "npm ci && hugo --gc --minify -b $DEPLOY_PRIME_URL/experts/ && npx pagefind --site public/experts && cp public/experts/_redirects public/_redirects"

[context.next.environment]
  HUGO_ENABLEGITINFO = "true"

# Ensure redirect from mobb.ninja to cloud.redhat.com/experts (/docs first to prevent unnecessary double redirects)
[[redirects]]
from = "https://mobb.ninja/docs/*"
to = "https://cloud.redhat.com/experts/:splat"
status = 301

[[redirects]]
from = "http://mobb.ninja/docs/*"
to = "https://cloud.redhat.com/experts/:splat"
status = 301

[[redirects]]
from = "https://mobb.ninja/*"
to = "https://cloud.redhat.com/experts/:splat"
status = 301

[[redirects]]
from = "http://mobb.ninja/*"
to = "https://cloud.redhat.com/experts/:splat"
status = 301

# Ensure redirect from / to /experts/ if user doesn't land on redhat.com domain
