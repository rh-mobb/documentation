## SP cluster version — uses K8s Secret for Azure credentials
apiVersion: v1
kind: Namespace
metadata:
  name: blob-writer
---
apiVersion: v1
kind: Secret
metadata:
  name: azure-sp-credentials
  namespace: blob-writer
type: Opaque
stringData:
  AZURE_TENANT_ID: "<your-tenant-id>"
  AZURE_CLIENT_ID: "<your-sp-client-id>"
  AZURE_CLIENT_SECRET: "<your-sp-client-secret>"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: blob-writer
  namespace: blob-writer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: blob-writer
  template:
    metadata:
      labels:
        app: blob-writer
    spec:
      containers:
        - name: blob-writer
          image: image-registry.openshift-image-registry.svc:5000/blob-writer/blob-writer:latest
          ports:
            - containerPort: 8080
          env:
            - name: AZURE_STORAGE_ACCOUNT_URL
              value: "https://<your-storage-account>.blob.core.windows.net"
            - name: AZURE_STORAGE_CONTAINER
              value: "demo-data"
            - name: CLUSTER_NAME
              value: "sp-cluster"
          envFrom:
            - secretRef:
                name: azure-sp-credentials
---
apiVersion: v1
kind: Service
metadata:
  name: blob-writer
  namespace: blob-writer
spec:
  selector:
    app: blob-writer
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: blob-writer
  namespace: blob-writer
spec:
  to:
    kind: Service
    name: blob-writer
  port:
    targetPort: 8080
  tls:
    termination: edge
