## SP cluster version — uses K8s Secret for Azure credentials
apiVersion: v1
kind: Namespace
metadata:
  name: keyvault-reader
---
apiVersion: v1
kind: Secret
metadata:
  name: azure-sp-credentials
  namespace: keyvault-reader
type: Opaque
stringData:
  AZURE_TENANT_ID: "<your-tenant-id>"
  AZURE_CLIENT_ID: "<your-sp-client-id>"
  AZURE_CLIENT_SECRET: "<your-sp-client-secret>"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keyvault-reader
  namespace: keyvault-reader
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keyvault-reader
  template:
    metadata:
      labels:
        app: keyvault-reader
    spec:
      containers:
        - name: keyvault-reader
          image: image-registry.openshift-image-registry.svc:5000/keyvault-reader/keyvault-reader:latest
          ports:
            - containerPort: 8080
          env:
            - name: AZURE_KEYVAULT_URL
              value: "https://<your-keyvault-name>.vault.azure.net/"
          envFrom:
            - secretRef:
                name: azure-sp-credentials
---
apiVersion: v1
kind: Service
metadata:
  name: keyvault-reader
  namespace: keyvault-reader
spec:
  selector:
    app: keyvault-reader
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: keyvault-reader
  namespace: keyvault-reader
spec:
  to:
    kind: Service
    name: keyvault-reader
  port:
    targetPort: 8080
  tls:
    termination: edge
