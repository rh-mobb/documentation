<script type="module">
  import '@rhds/elements/rh-navigation-secondary/rh-navigation-secondary.js';
  import '@rhds/elements/rh-footer/rh-footer.js';
  import '@rhds/elements/rh-cta/rh-cta.js';
  import '@rhds/elements/rh-alert/rh-alert.js';
  import '@rhds/elements/rh-tag/rh-tag.js';
  import '@rhds/elements/rh-code-block/rh-code-block.js';
  import '@rhds/elements/rh-icon/rh-icon.js';
</script>

<script src="{{ "pagefind/pagefind-ui.js" | relURL }}" defer></script>
<script defer>
  document.addEventListener('DOMContentLoaded', function () {
    if (typeof window.PagefindUI === 'undefined') {
      return;
    }
    new window.PagefindUI({
      element: '#site-search',
      showSubResults: true,
      showImages: false,
      translations: {
        placeholder: 'Search documentation',
        search_label: 'Search Cloud Experts documentation'
      }
    });
  });
</script>

{{- with resources.Get "js/main.js" }}
  {{- if not hugo.IsProduction }}
    {{- with . | js.Build }}
<script defer src="{{ .RelPermalink }}"></script>
    {{- end }}
  {{- else }}
    {{- $opts := dict "minify" true }}
    {{- with . | js.Build $opts | fingerprint }}
<script defer src="{{ .RelPermalink }}" integrity="{{- .Data.Integrity }}" crossorigin="anonymous"></script>
    {{- end }}
  {{- end }}
{{- end }}
