## MI cluster version — uses workload identity (no secrets)
apiVersion: v1
kind: Namespace
metadata:
  name: keyvault-reader
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: keyvault-reader-sa
  namespace: keyvault-reader
  annotations:
    azure.workload.identity/client-id: "<your-managed-identity-client-id>"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keyvault-reader
  namespace: keyvault-reader
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keyvault-reader
  template:
    metadata:
      labels:
        app: keyvault-reader
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: keyvault-reader-sa
      containers:
        - name: keyvault-reader
          image: image-registry.openshift-image-registry.svc:5000/keyvault-reader/keyvault-reader:latest
          ports:
            - containerPort: 8080
          env:
            - name: AZURE_KEYVAULT_URL
              value: "https://<your-keyvault-name>.vault.azure.net/"
---
apiVersion: v1
kind: Service
metadata:
  name: keyvault-reader
  namespace: keyvault-reader
spec:
  selector:
    app: keyvault-reader
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: keyvault-reader
  namespace: keyvault-reader
spec:
  to:
    kind: Service
    name: keyvault-reader
  port:
    targetPort: 8080
  tls:
    termination: edge
