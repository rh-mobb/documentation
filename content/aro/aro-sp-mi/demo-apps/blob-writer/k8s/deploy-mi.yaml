## MI cluster version — uses workload identity (no secrets)
apiVersion: v1
kind: Namespace
metadata:
  name: blob-writer
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: blob-writer-sa
  namespace: blob-writer
  annotations:
    azure.workload.identity/client-id: "<your-managed-identity-client-id>"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: blob-writer
  namespace: blob-writer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: blob-writer
  template:
    metadata:
      labels:
        app: blob-writer
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: blob-writer-sa
      containers:
        - name: blob-writer
          image: image-registry.openshift-image-registry.svc:5000/blob-writer/blob-writer:latest
          ports:
            - containerPort: 8080
          env:
            - name: AZURE_STORAGE_ACCOUNT_URL
              value: "https://<your-storage-account>.blob.core.windows.net"
            - name: AZURE_STORAGE_CONTAINER
              value: "demo-data"
            - name: CLUSTER_NAME
              value: "mi-cluster"
---
apiVersion: v1
kind: Service
metadata:
  name: blob-writer
  namespace: blob-writer
spec:
  selector:
    app: blob-writer
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: blob-writer
  namespace: blob-writer
spec:
  to:
    kind: Service
    name: blob-writer
  port:
    targetPort: 8080
  tls:
    termination: edge
